<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4">Logowanie</h2>
    <form>
      <div class="mb-3">
        <input type="email" class="form-control" id="email" placeholder="Nazwa użytkownika">
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="password" placeholder="Hasło">
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-success">Zaloguj się</button>
      </div>
    </form>
  </div>

  <!-- Bootstrap JS (opcjonalnie) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
